<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Редагувати користувача</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Редагувати користувача: <span th:text="${user.username}"></span></h1>
        <form th:action="@{/admin/user/edit/{id}(id=${user.id})}" th:object="${user}" method="post">
            <div class="form-group">
                <label>Ім'я користувача:</label>
                <input type="text" th:field="*{username}" required />
            </div>
            <div class="form-group">
                <label>Новий пароль (залиште порожнім, щоб не змінювати):</label>
                <input type="password" name="newPassword" />
            </div>
            <div class="form-group">
                <label>Роль:</label>
                <select th:field="*{role}">
                    <option value="STUDENT">STUDENT</option>
                    <option value="TEACHER">TEACHER</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
            </div>
            <button type="submit">Зберегти зміни</button>
            <a href="/admin/dashboard" class="btn">Скасувати</a>
        </form>
    </div>
</body>
</html>
