<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Створити тест</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .summary-box { position: sticky; top: 0; background: #2c3e50; color: white; padding: 15px; z-index: 1000; border-radius: 0 0 8px 8px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .question-block { border: 2px solid #3498db; padding: 20px; margin-bottom: 20px; border-radius: 8px; background: #fff; }
        .answer-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding: 8px; background: #f8f9fa; border-radius: 4px; }
        .type-info { font-weight: bold; padding: 5px 10px; border-radius: 4px; display: inline-block; margin-bottom: 10px; }
        .single { background: #d4edda; color: #155724; }
        .multi { background: #fff3cd; color: #856404; }
        .none { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <div class="summary-box">
            <span>Створення тесту: <strong th:text="${test.course.name}"></strong></span>
            <span>Загальний бал: <strong id="totalScore">0</strong></span>
        </div>

    <form th:action="${isAdmin == true ? '/admin/test/save' : '/teacher/course/' + test.course.id + '/test/add'}"
    th:object="${test}"
    method="post">

    <input type="hidden" th:field="*{id}" />

    <input type="hidden" name="courseId" th:value="${test.course.id}" />
            <div class="form-group">
                <label>Заголовок тесту:</label>
                <input type="text" th:field="*{title}" required />
            </div>

            <div class="form-group">
                <label>Опис:</label>
                <textarea th:field="*{description}" rows="2"></textarea>
            </div>

            <div id="questionsContainer">

    <div th:each="question, qStat : ${test.questions}" class="question-block" th:id="'q-block-' + ${qStat.index}">
        <input type="hidden" th:field="*{questions[__${qStat.index}__].id}" />

        <div style="display: flex; justify-content: space-between;">
            <h3 style="margin:0">Питання №<span th:text="${qStat.index + 1}"></span></h3>
            <div style="display: flex; align-items: center; gap: 10px;">
                <label>Бал:</label>
                <input type="number" th:field="*{questions[__${qStat.index}__].points}" min="1" style="width:60px" class="q-points" onchange="updateTotalScore()">
            </div>
        </div>

        <input type="text" th:field="*{questions[__${qStat.index}__].question}" placeholder="Текст питання" required style="margin: 15px 0;">

        <div th:id="'options-' + ${qStat.index}">
            <div th:each="option, oStat : ${question.options}" class="answer-row">
                <input type="hidden" th:field="*{questions[__${qStat.index}__].options[__${oStat.index}__].id}" />
                <input type="checkbox" th:field="*{questions[__${qStat.index}__].options[__${oStat.index}__].correct}" class="correct-check">
                <input type="text" th:field="*{questions[__${qStat.index}__].options[__${oStat.index}__].optionText}" placeholder="Варіант відповіді" required>
            </div>
        </div>

        <button type="button" th:onclick="'addOption(' + ${qStat.index} + ')'" class="btn small-btn" style="background:#3498db">+ Додати відповідь</button>
        <button type="button" th:onclick="'removeQuestion(' + ${qStat.index} + ')'" class="btn small-btn" style="background:#e74c3c">Видалити питання</button>
    </div>
</div>

            <button type="button" onclick="addQuestion()" class="btn" style="background: #27ae60;">+ Додати питання</button>

            <hr>
            <div style="display: flex; gap: 20px;">
                <div class="form-group" style="flex: 1;">
                    <label>Дата та час початку:</label>

                    <input type="datetime-local" th:field="*{startTime}" required />
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Дата та час закінчення:</label>
                    <input type="datetime-local" th:field="*{endTime}" required />
                </div>
            </div>

            <div style="margin-top: 30px; text-align: center;">
                <button type="submit" class="btn">Зберегти тест</button>
                <a th:href="${isAdmin ? '/admin/dashboard' : '/teacher/course/' + test.course.id}"
                class="btn" style="background:#95a5a6;">Скасувати</a>
            </div>
        </form>
    </div>

    <script th:inline="javascript">
    let qCount = /*[[${test.questions != null ? test.questions.size() : 0}]]*/ 0;

    function addQuestion() {
        const container = document.getElementById('questionsContainer');
        const qIdx = qCount++;
        const html = `
            <div class="question-block" id="q-block-${qIdx}">
                <div style="display: flex; justify-content: space-between;">
                    <h3 style="margin:0">Питання №${qIdx + 1}</h3>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <label>Бал:</label>
                        <input type="number" name="questions[${qIdx}].points" value="1" min="1" style="width:60px" class="q-points" onchange="updateTotalScore()">
                    </div>
                </div>
                <input type="text" name="questions[${qIdx}].question" placeholder="Текст питання" required style="margin: 15px 0;">
                <div id="options-${qIdx}"></div>
                <button type="button" onclick="addOption(${qIdx})" class="btn small-btn" style="background:#3498db">+ Додати відповідь</button>
                <button type="button" onclick="removeQuestion(${qIdx})" class="btn small-btn" style="background:#e74c3c">Видалити питання</button>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', html);
        addOption(qIdx);
        updateTotalScore();
    }

    function addOption(qIdx) {
    const container = document.getElementById(`options-${qIdx}`);
    const oIdx = container.querySelectorAll('.answer-row').length;
    const html = `
        <div class="answer-row">
            <input type="checkbox" name="questions[${qIdx}].options[${oIdx}].correct" class="correct-check">
            <input type="text" name="questions[${qIdx}].options[${oIdx}].optionText" placeholder="Варіант відповіді" required>
            <button type="button" onclick="this.parentElement.remove();" class="btn small-btn" style="background:#bdc3c7">×</button>
        </div>
    `;
    container.insertAdjacentHTML('beforeend', html);
}

    function removeQuestion(qIdx) {
        document.getElementById(`q-block-${qIdx}`).remove();
        updateTotalScore();
    }

    function updateTotalScore() {
        let total = 0;
        document.querySelectorAll('.q-points').forEach(input => {
            total += parseInt(input.value) || 0;
        });
        document.getElementById('totalScore').innerText = total;
    }

    window.onload = function() {
        if (qCount === 0) addQuestion();
        updateTotalScore();
    };
</script>
</body>
</html>
