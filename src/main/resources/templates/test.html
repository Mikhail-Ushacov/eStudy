<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title th:text="${test.title}"></title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h1 th:text="${test.title}"></h1>
        <p><strong>Курс:</strong> <a th:href="@{/courses/{id}(id=${test.course.id})}" th:text="${test.course.name}"></a></p>

        <nav>
            <a href="/">Головна</a>
            <a th:href="@{/courses/{id}(id=${test.course.id})}">Повернутися до курсу</a>
            <a href="/logout">Вийти</a>
        </nav>

        <hr>
        
        <div th:if="${param.error}" class="alert-error">
            <span th:text="${param.error}"></span>
        </div>

        <form th:action="@{/tests/{id}/submit(id=${test.id})}" method="post">
            <div th:if="${questions.isEmpty()}">
                <p>У цьому тесті ще немає питань.</p>
                <span sec:authorize="hasRole('TEACHER')">
                     <a th:href="@{/teacher/test/{testId}/question/add(testId=${test.id})}" class="btn">Додати питання</a>
                </span>
            </div>

            <div th:each="q, stat : ${questions}" class="form-group">
                <p><strong th:text="${stat.index + 1} + '. ' + ${q.question}"></strong> 
                (<span th:text="${q.points}"></span> б.)</p>
                
                <div th:each="opt : ${q.options}">
                    <label>
                        <!-- Якщо питання має кілька правильних відповідей, використовуємо checkbox, якщо одну - radio -->
                        <input th:type="${q.options.?[isCorrect].size() > 1 ? 'checkbox' : 'radio'}" 
                            th:name="'q' + ${q.id}" 
                            th:value="${opt.id}" />
                        <span th:text="${opt.optionText}"></span>
                    </label>
                </div>
            </div>
            
            <div th:if="${!questions.isEmpty()}">
                <button type="submit" class="btn">Надіслати тест</button>
            </div>
        </form>
    </div>
</body>
</html>
