<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Додати питання</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Додати нове питання до тесту: <span th:text="${test.title}"></span></h1>

        <form th:action="${isAdmin} ? @{/admin/question/save(testId=${test.id})} : @{/teacher/test/{testId}/question/add(testId=${test.id})}" th:object="${question}" method="post">
            <div class="form-group">
                <label for="question">Питання:</label>
                <textarea id="question" th:field="*{question}" rows="3" required></textarea>
            </div>

            <div class="form-group">
                <label for="optionA">Варіант A:</label>
                <input type="text" id="optionA" th:field="*{optionA}" required />
            </div>
            <div class="form-group">
                <label for="optionB">Варіант B:</label>
                <input type="text" id="optionB" th:field="*{optionB}" required />
            </div>
            <div class="form-group">
                <label for="optionC">Варіант C:</label>
                <input type="text" id="optionC" th:field="*{optionC}" required />
            </div>
            <div class="form-group">
                <label for="optionD">Варіант D:</label>
                <input type="text" id="optionD" th:field="*{optionD}" required />
            </div>

            <div class="form-group">
                <label for="correctAnswer">Правильна відповідь (A, B, C або D):</label>
                <select id="correctAnswer" th:field="*{correctAnswer}" required>
                    <option value="">Оберіть правильну відповідь</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                </select>
            </div>

            <div class="form-group">
                <label for="points">Бали за питання:</label>
                <input type="number" id="points" th:field="*{points}" min="1" required />
            </div>

            <button type="submit">Додати питання</button>
            <a th:href="${isAdmin} ? @{/admin/dashboard} : @{/teacher/course/{courseId}(courseId=${test.course.id})}" class="btn">Скасувати</a>
        </form>
    </div>
</body>
</html>
