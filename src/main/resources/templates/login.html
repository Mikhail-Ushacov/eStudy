<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Вхід</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div style="margin: 50px auto; width: 300px; padding: 20px; border: 1px solid #ccc;">
        <h2>Вхід до навчальної системи</h2>
        
        <div th:if="${success}" style="background: #d4edda; color: #155724; padding: 10px; border-radius: 4px; margin-bottom: 15px;">
            <span th:text="${success}"></span>
        </div>

        <div th:if="${param.error}" style="color: red; margin-bottom: 10px;">
            Невірне ім'я користувача або пароль.
        </div>

        <form th:action="@{/login}" method="post">
            <div>
                <label>Ім'я користувача:</label>
                <input type="text" name="username" required style="width: 100%"/>
            </div>
            <div style="margin-top: 10px;">
                <label>Пароль:</label>
                <input type="password" name="password" required style="width: 100%"/>
            </div>
            <div style="margin-top: 20px;">
                <button type="submit" style="width: 100%">Увійти</button>
            </div>
        </form>

        <div style="text-align: center; margin-top: 15px;">
            <p>Немає облікового запису? <a href="/register" style="color: #007bff;">Зареєструватися</a></p>
        </div>
    </div>
</body>
</html>
