<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${lecture.title}"></title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h1 th:text="${lecture.title}"></h1>
        <p th:text="${lecture.description}" style="font-style: italic; color: #7f8c8d;"></p>
        
        <div style="background: #f1f1f1; padding: 10px; border-radius: 5px; margin-bottom: 20px;">
            <small>
                Час проведення: 
                <span th:text="${#temporals.format(lecture.startTime, 'dd.MM.yyyy HH:mm')}"></span> 
                — 
                <span th:text="${#temporals.format(lecture.endTime, 'dd.MM.yyyy HH:mm')}"></span>
            </small>
        </div>

        <div th:each="sec : ${lecture.sections}" style="margin-bottom: 30px;">
            <h3 th:text="${sec.sectionTitle}" style="text-align: left; border-left: 4px solid #3498db; padding-left: 10px;"></h3>
            <div th:text="${sec.sectionText}" style="white-space: pre-wrap;"></div>
        </div>
        
        <nav>
            <a th:href="@{/student/course/{id}(id=${lecture.course.id})}" class="btn">Назад до курсу</a>
        </nav>
    </div>
</body>
</html>
