<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div style="margin: 50px auto; width: 300px; padding: 20px; border: 1px solid #ccc;">
        <h2>Academic System Login</h2>
        
        <div th:if="${param.error}" style="color: red; margin-bottom: 10px;">
            Invalid username or password.
        </div>

        <form th:action="@{/login}" method="post">
            <div>
                <label>Username:</label>
                <input type="text" name="username" required style="width: 100%"/>
            </div>
            <div style="margin-top: 10px;">
                <label>Password:</label>
                <input type="password" name="password" required style="width: 100%"/>
            </div>
            <div style="margin-top: 20px;">
                <button type="submit" style="width: 100%">Login</button>
            </div>
        </form>
    </div>
</body>
</html>
