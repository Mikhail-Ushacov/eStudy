<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Кабінет студента</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <h1>LMS Університет</h1>
        <div>
            <span th:text="'Вітаємо, ' + ${username}">Студент</span> | 
            <a th:href="@{/logout}" style="color: white;">Вийти</a>
        </div>
    </header>

    <div class="container">
        <h2>Мої курси</h2>
        
        <!-- Сітка курсів -->
        <div class="course-grid">
            <!-- Демонстраційна картка (У реальності генерується через th:each) -->
            <div class="card" th:each="course : ${activeCourses}">
                <h3 th:text="${course.title}">Програмування на Java</h3>
                <p th:text="${course.description}">Вивчення ООП та Spring Boot.</p>
                <hr>
                <p><strong>Прогрес:</strong> <span th:text="${course.progress}">50%</span></p>
                <a th:href="@{'/student/course/' + ${course.id}}" class="btn">Перейти до курсу</a>
            </div>
        </div>

        <h2 style="margin-top: 2rem;">Доступні для запису</h2>
        <a th:href="@{/student/enroll}" class="btn">Каталог курсів</a>
    </div>
</body>
</html>
